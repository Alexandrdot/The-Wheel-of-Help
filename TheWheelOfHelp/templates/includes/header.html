{% load static %}
<div class="header">
    <ul class="mainmenu">
        <li class="logo">
            <a href="{% url 'homepage:index' %}">
                <div class="logo"></div>
            </a>
        </li>
        <li><a href="{% url 'homepage:index' %}">Главная</a></li>
        <li><a href="{% url 'homepage:tech_station' %}">СТО</a></li>
        <li><a href="{% url 'homepage:evacuator' %}">Эвакуаторы</a></li>
        <li><a href="{% url 'homepage:tire_service' %}">Шиномонтаж</a></li>
        
        <!-- Форма поиска -->
        <li class="search-form">
            <form action="{% url 'homepage:search' %}" method="get">
                <input type="text" name="q" placeholder="Поиск..." class="search-input">
                <button type="submit" class="search-button">Найти</button>
            </form>
        </li>
        
        {% comment %} {% if user.is_authenticated %}
            <li class="last">{{ user.username }} | 
                <a href="{% url 'logout' %}">Выйти</a>
            </li>
        {% else %}
            <li class="last">
                <a href="{% url 'login' %}">Войти</a> | 
                <a href="{% url 'register' %}">Регистрация</a>
            </li>
        {% endif %} {% endcomment %}
    </ul>
    <div class="clear"></div>
</div>
